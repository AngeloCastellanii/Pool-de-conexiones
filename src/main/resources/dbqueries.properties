# Queries permitidas para DbComponent (sin SQL crudo publico)
producto.listar=SELECT id, nombre, precio, stock FROM productos ORDER BY id LIMIT 20
producto.stock_bajo=SELECT id, nombre, stock FROM productos WHERE stock < 50 ORDER BY stock
pedido.pendientes=SELECT id, cliente_id, estado, creado_en FROM pedidos WHERE estado = 'pendiente' ORDER BY creado_en DESC LIMIT 20
